version: 1
root: /usr/share/seclists
selectors:
  dirs:
    description: Directory bust (gobuster dir, no extension)
    default: common
    recommended: raft-small-directories
    entry_ids:
    - common
    - quickhits
    - raft-small-directories
  dirs-ext:
    description: Basename + extension fuzz (scout -d -x)
    default: common
    recommended: dirbuster-small
    entry_ids:
    - common
    - dirbuster-small
    - dirbuster-medium
  ext-fuzz:
    description: Known file stem + SecLists extensions (scout -d file.ext, ffuf)
    default: ext-fuzz-backup
    recommended: fuzzing-extensions-skipfish-fuzz
    entry_ids:
    - ext-fuzz-backup
    - fuzzing-extensions-skipfish-fuzz
    - fuzzing-extensions-most-common-fuzz
    - fuzzing-file-extensions-lower-case
    - fuzzing-extensions-compressed-fuzz
    - fuzzing-extensions-bo0om
dirs_multi_preset_chain:
- light
- standard
- wide
- deep
dirs_multi_presets:
  light:
    description: quick pass (common + quickhits)
    adds:
    - common
    - quickhits
  standard:
    description: CTF default (+ raft-small-directories)
    adds:
    - raft-small-directories
  wide:
    description: add raft-small-files (4 jobs cumulative)
    adds:
    - discovery-web-content-raft-small-files
  deep:
    description: add dirbuster-small + raft-small-words (6 jobs cumulative)
    adds:
    - dirbuster-small
    - raft-small-words
dirs_ext_multi_preset_chain:
- light
- standard
- wide
- deep
dirs_ext_multi_presets:
  light:
    description: ext fuzz quick (common only)
    adds:
    - common
  standard:
    description: ext fuzz default (+ dirbuster-small)
    adds:
    - dirbuster-small
  wide:
    description: add dirbuster-medium (3 jobs cumulative)
    adds:
    - dirbuster-medium
  deep:
    description: add raft-small-files (4 jobs cumulative)
    adds:
    - discovery-web-content-raft-small-files
