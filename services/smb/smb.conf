[global]
   workgroup = WORKGROUP
   server string = SMB test target
   map to guest = Bad User
   guest account = nobody
   log file = /var/log/samba/log.%m
   max log size = 1000
   server role = standalone server
   obey pam restrictions = no
   pam password change = no
   unix password sync = no
   passwd program = /bin/false
   disable spoolss = yes
   load printers = no
   printing = bsd
   smb ports = 445 139

[public]
   path = /srv/samba/public
   browseable = yes
   read only = no
   guest ok = yes
   force user = nobody
   create mask = 0666
   directory mask = 0777

[private]
   path = /srv/samba/private
   browseable = yes
   read only = no
   guest ok = no
   valid users = smbuser
   create mask = 0660
   directory mask = 0770
