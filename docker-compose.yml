services:
  kali:
    build:
      context: .
      dockerfile: ./kali/Dockerfile

    entrypoint: ["/usr/local/bin/entrypoint.sh"]

    environment:
      - VNC_PASSWORD=${VNC_PASSWORD}
      - WPSCAN_API_TOKEN=${WPSCAN_API_TOKEN}
      - TOOLKIT_LANG=${TOOLKIT_LANG}

    volumes:
      # working directory
      - ./workspace:/workspace

      # recon app (code read-only; data/ is rw overlay for recon.db)
      - ./recon:/opt/recon:ro
      - ./recon/data:/opt/recon/data

      # configs
      - ./config/openvpn/tryhackme.ovpn:/etc/openvpn/tryhackme.ovpn:ro
      - ./dotfiles/tmux/.tmux.conf:/home/kali/.tmux.conf:ro
      - ./dotfiles/zsh/.p10k.zsh:/home/kali/.p10k.zsh
      - ./dotfiles/zsh/.zsh:/home/kali/.zsh:ro
      - ./dotfiles/zsh/.zshrc:/home/kali/.zshrc
      - ./kali/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro

    tty: true
    stdin_open: true

    cap_add:
      - NET_ADMIN

    devices:
      - /dev/net/tun

    ports:
      - "1080:1080" # SOCKS5
      - "5905:5901" # VNC
      - "6080:6080" # noVNC
      - "7681:7681" # ttyd
      - "8080:8080" # Burp
